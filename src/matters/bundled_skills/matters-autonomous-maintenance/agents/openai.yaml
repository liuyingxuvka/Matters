interface:
  display_name: "Matters Autonomous Maintenance"
  short_description: "Advance the coverage ledger through existing owners"
  default_prompt: "Use $matters-autonomous-maintenance through MatterService to scan the full coverage ledger and advance deterministic_hard_exclusion, preprocessing, low-cost annotation, ambiguity resolution when needed, Matter reconciliation/hierarchy, material-clue summary, bilingual projection, generated hero, supplemental information, and UI reachability in dependency order. The model-independent roles are deterministic_preprocessor, low_cost_annotator, ambiguity_resolver, matter_modeler, hero_image_generator, consistency_reviewer, and maintenance_orchestrator. Preserve source_neighborhood_id, source_group_chain, source_group_labels, and source_spatial_context_revision for parent/child WorkItem hierarchy audit and English/Chinese title, summary, topic type, generated_hero, and research_operation handoff. Canonical state is never public. Preserve private source context, delegate bounded inexpensive work when compatible, and never expose absolute paths or private labels. ResearchGuard is separate evidence enrichment. Never bind a named model, request an API key, call a provider API directly, or use a direct API fallback."
