interface:
  display_name: "Matters Research Orchestration"
  short_description: "Run the single ResearchOperation boundary"
  default_prompt: "Use $matters-research-orchestration through MatterService only as the research_operation/ResearchGuard advisory lane after deterministic_hard_exclusion; it can propose evidence-backed supplemental information but cannot write canonical state. The model-independent roles are deterministic_preprocessor, low_cost_annotator, ambiguity_resolver, matter_modeler, hero_image_generator, consistency_reviewer, and maintenance_orchestrator. Preserve source_neighborhood_id, source_group_chain, source_group_labels, and source_spatial_context_revision for parent/child WorkItem hierarchy audit and English/Chinese title, summary, topic type, generated_hero, and research_operation handoff. ResearchGuard never generates the hero and never turns generated imagery into evidence. Preserve private source context without absolute paths, public records, or private labels. Never bind a named model, request an API key, call a provider API directly, or use a direct API fallback."
