interface:
  display_name: "Matters Source Governance"
  short_description: "Govern authorized scope and automatic tracking policy"
  default_prompt: "Use $matters-source-governance through MatterService to apply deterministic_hard_exclusion before AI and disposition every declared target without expanding authorization. The model-independent roles are deterministic_preprocessor, low_cost_annotator, ambiguity_resolver, matter_modeler, hero_image_generator, consistency_reviewer, and maintenance_orchestrator; source governance never creates Matter, hierarchy, activity, hero, supplemental, or UI state. Preserve source_neighborhood_id, source_group_chain, source_group_labels, and source_spatial_context_revision for parent/child WorkItem hierarchy audit and English/Chinese title, summary, topic type, generated_hero, and research_operation handoff. Canonical state is never public. Preserve bounded private source context and never expose absolute paths or private labels. Never bind a named model, request an API key, call a provider API directly, or use a direct API fallback."
