interface:
  display_name: "Matters Inventory Reconciliation"
  short_description: "Reconcile source inventories and changes"
  default_prompt: "Use $matters-inventory-reconciliation through MatterService to account for every current and prior occurrence, honor deterministic_hard_exclusion, and return one exact snapshot and change set. The model-independent roles are deterministic_preprocessor, low_cost_annotator, ambiguity_resolver, matter_modeler, hero_image_generator, consistency_reviewer, and maintenance_orchestrator; only original owners write Matter, hierarchy, activity, hero, supplemental, or UI state. Preserve source_neighborhood_id, source_group_chain, source_group_labels, and source_spatial_context_revision for parent/child WorkItem hierarchy audit and English/Chinese title, summary, topic type, generated_hero, and research_operation handoff. Canonical state is never public. Preserve private source-neighborhood context and never expose absolute paths or labels. Never bind a named model, request an API key, call a provider API directly, or use a direct API fallback."
