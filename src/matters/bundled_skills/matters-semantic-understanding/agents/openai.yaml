interface:
  display_name: "Matters Semantic Understanding"
  short_description: "Run model-independent source annotation and Matter modeling"
  default_prompt: "Use $matters-semantic-understanding only through MatterService after deterministic_hard_exclusion. Follow the model-independent roles deterministic_preprocessor, low_cost_annotator, ambiguity_resolver, matter_modeler, hero_image_generator, consistency_reviewer, and maintenance_orchestrator. Annotation returns only source_annotation; matter_modeler proposes evidence-supported parent/child Matters, WorkItems, context_signals, granularity, material clues with user-world time, people/events/lifecycle/outcome, equivalent English/Chinese title and summary, topic type, abstract hero concepts, and supplemental information; original owners alone write canonical state. Preserve observed/reported facts as observed/reported and future schedules as planned. Inferred Event, WorkItem, lifecycle, or outcome findings may fill only a necessary past gap and must bind analysis_as_of, target_time, reversibility, and contradiction triggers; future forecasts belong only to the advisory C11 Situation/World Model and must be testable, expiring, and model-miss-producing on contradiction. Preserve source_neighborhood_id, source_group_chain, source_group_labels, and source_spatial_context_revision for hierarchy audit. The generated_hero role receives only a minimized abstract brief and never Source/Evidence; research_operation is separate. Preserve bounded private source context without returning absolute paths, public records, or private labels. Cite only allowed evidence, disposition every input, never bind a named model, request an API key, call a provider API directly, or use a direct API fallback, and return the exact v4 advisory schema."
