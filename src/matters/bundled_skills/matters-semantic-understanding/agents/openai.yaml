interface:
  display_name: "Matters Semantic Understanding"
  short_description: "Run model-independent source annotation and Matter modeling"
  default_prompt: "Use $matters-semantic-understanding only through MatterService after deterministic_hard_exclusion. Follow the model-independent roles deterministic_preprocessor, low_cost_annotator, ambiguity_resolver, matter_modeler, hero_image_generator, consistency_reviewer, and maintenance_orchestrator. Annotation returns only source_annotation; matter_modeler proposes evidence-supported parent/child Matters, WorkItems, context_signals, strict granularity, material clues with user-world time, people/events/lifecycle/outcome, equivalent English/Chinese title and summary, topic type, abstract hero concepts, and supplemental information; original owners alone write canonical state. A Matter requires a stable identity, a goal or obligation, and an independent lifecycle, outcome, or next-step dimension; one message, payment, upload, reminder, check-in, or occurrence stays a WorkItem or Event. During a cross-source Matter refresh, give every WorkItem and open loop one stable language-neutral semantic_role_key, reuse its current identity, and name exact legacy duplicates only in supersedes_item_ids or supersedes_loop_ids; never replace by title similarity. Keep object kind, temporal assertion, basis modality, workflow state, and terminality separate. Preserve observed/reported facts as observed/reported and future schedules as planned. Historical inference is revisable and provisional. A current WorkItem or lifecycle phase may be inferred only from an evidenced completed prerequisite, remaining obligation, active window, contradiction review, support, coverage, alternatives, expiry, and contradiction triggers; it never says future work already happened. Future forecasts belong only to the advisory C11 Situation/World Model and must be testable, expiring, and model-miss-producing on contradiction. Preserve source_neighborhood_id, source_group_chain, source_group_labels, and source_spatial_context_revision for hierarchy audit. The generated_hero role receives only a minimized abstract brief and never Source/Evidence; research_operation is separate. Preserve bounded private source context without returning absolute paths, public records, or private labels. Cite only allowed evidence, disposition every input, never bind a named model, request an API key, call a provider API directly, or use a direct API fallback, and return the exact v4 advisory schema."
