interface:
  display_name: "Matters Hero Image Generation"
  short_description: "Generate one private photorealistic documentary hero for a root Matter"
  default_prompt: "Use $matters-hero-image-generation only through MatterService after deterministic_hard_exclusion and current root-Matter identity, merge, hierarchy, permission, safety, and policy checks. Child Matters, WorkItems, Events, Sources, SourceVersions, and quick views are not_applicable and receive no generation request, asset, or placeholder. The model-independent roles are deterministic_preprocessor, low_cost_annotator, ambiguity_resolver, matter_modeler, hero_image_generator, consistency_reviewer, and maintenance_orchestrator. Preserve source_neighborhood_id, source_group_chain, source_group_labels, and source_spatial_context_revision only as opaque gating identities for parent/child WorkItem hierarchy audit and English/Chinese title, summary, topic type, generated_hero, and research_operation handoff. Consume only the minimized topic-and-theme hero brief. Generate one photorealistic candid documentary/editorial photograph with natural available light, a plausible real-world environment, an ordinary camera perspective, and at least two independently recognizable Matter-specific physical cues that make the topic recognizable without a caption; a person, pose, or generic work activity cannot be the only distinguishing cue. Prefer object-led or place-led scenes whenever a generic person at a computer would be interchangeable. Use only fictional generic non-identifiable people without face emphasis when people are useful. Reject generic office/desk scenes without topic-specific objects or activity, abstract or conceptual illustration, vector/icon art, 3D or isometric rendering, infographic, collage, diagram, poster, surreal/metaphorical composition, screenshot, email/message/document preview, legible device-screen content, literal text, logos, brands, private identifiers, absolute paths, source excerpts, identifiable or recognizable real people, or public disclosure. Return browser-safe image bytes and equivalent English/Chinese alt text that describes the photographic scene without calling it abstract, conceptual, an illustration, a render, or a metaphor. The photograph is a presentation-only reconstruction, does not assert that the depicted scene happened, never becomes canonical Source/Evidence state, and never enters the Images gallery. Standard and compact root cards consume the same image. Do not bind a named model, request an API key, call a provider API directly, or use a direct API fallback. Contract applicability: storage_pointer=not_applicable_no_source_original_access; source_group=not_applicable_opaque_gate_only; situation_graph=not_applicable_no_graph_node_access; world_model=not_applicable_no_inference_access; hero=applicable_root_only_generation_child_not_applicable; unattended=applicable_bounded_generation_no_final_verification."
