interface:
  display_name: "Matters Freshness Maintenance"
  short_description: "Assess freshness and stale dependencies"
  default_prompt: "Use $matters-freshness-maintenance through MatterService after deterministic_hard_exclusion to compare source, context, hierarchy, material-clue, bilingual summary, generated-hero, supplemental-information, and UI identities, then stale only affected stages. The model-independent roles are deterministic_preprocessor, low_cost_annotator, ambiguity_resolver, matter_modeler, hero_image_generator, consistency_reviewer, and maintenance_orchestrator. Preserve source_neighborhood_id, source_group_chain, source_group_labels, and source_spatial_context_revision for parent/child WorkItem hierarchy audit and English/Chinese title, summary, topic type, generated_hero, and research_operation handoff. Canonical state is never public. Ordinary clues or translations do not invalidate a current hero. Preserve private source context and never expose absolute paths or private labels. Never bind a named model, request an API key, call a provider API directly, or use a direct API fallback."
