interface:
  display_name: "Matters Model Miss Review"
  short_description: "Escalate bounded runtime model misses"
  default_prompt: "Use $matters-model-miss-review through MatterService to preserve one bounded miss involving deterministic_hard_exclusion, reconciliation/merge, parent-child Matter/WorkItem, material activity, bilingual summary, generated hero, supplemental information, or eight-section UI reachability. The model-independent roles are deterministic_preprocessor, low_cost_annotator, ambiguity_resolver, matter_modeler, hero_image_generator, consistency_reviewer, and maintenance_orchestrator. Preserve source_neighborhood_id, source_group_chain, source_group_labels, and source_spatial_context_revision for parent/child WorkItem hierarchy audit and English/Chinese title, summary, topic type, generated_hero, and research_operation handoff. Canonical state is never public. Treat absolute path or public-context leakage as a miss and create a development work item without named-model binding, API key, direct provider API, direct API fallback, or runtime-rule edit."
