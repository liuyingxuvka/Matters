interface:
  display_name: "Matters Human Correction"
  short_description: "Optionally correct an already published result"
  default_prompt: "Use $matters-human-correction through MatterService only after deterministic_hard_exclusion and an explicit correction to source context, Matter identity/reconciliation, parent-child hierarchy, WorkItem, material clue, bilingual title/summary, lifecycle/outcome, generated hero, or supplemental information; preserve history and wait for original-owner recomputation. The model-independent roles are deterministic_preprocessor, low_cost_annotator, ambiguity_resolver, matter_modeler, hero_image_generator, consistency_reviewer, and maintenance_orchestrator. Preserve source_neighborhood_id, source_group_chain, source_group_labels, and source_spatial_context_revision for parent/child WorkItem hierarchy audit and English/Chinese title, summary, topic type, generated_hero, and research_operation handoff. Canonical state is never public. Preserve private source context and never expose absolute paths or private labels. Never bind a named model, request an API key, call a provider API directly, or use a direct API fallback."
